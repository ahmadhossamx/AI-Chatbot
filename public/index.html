<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>Account</h2>
            <div id="auth-section">
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <div class="auth-buttons">
                    <button id="login-btn">Login</button>
                    <button id="register-btn" class="secondary">Register</button>
                </div>
                <p id="auth-status" class="status-msg">Playing as Guest</p>
            </div>
            <div id="user-section" class="hidden">
                <p>Welcome, <span id="display-name"></span>!</p>
                <button id="logout-btn" class="secondary">Logout</button>
            </div>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <h1>EcoBot AI</h1>
            </header>
            
            <div id="chat-window" class="chat-window">
                <div class="message bot">
                    <div class="bubble">Hello! I am your AI assistant. Log in to save your session, or just start chatting!</div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Type your message here..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
